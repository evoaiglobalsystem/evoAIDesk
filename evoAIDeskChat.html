<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css"/>
</head>
<body>
<div id="n8n-chat"></div>
<script>
  // Step 1 — receive tenantId from parent dashboard via postMessage
  window.addEventListener('message', (event) => {
    // IMPORTANT: lock this to your dashboard origin
    if (event.origin !== 'https://desk.evoaiglobal.ai/') return;

    const { tenantId } = event.data;
    if (!tenantId) return;

    sessionStorage.setItem('tenantId', tenantId);
    initChat(tenantId);
  });

  function initChat(tenantId) {
    window.n8nChat.createChat({
      webhookUrl: 'https://your-n8n.com/webhook/evoaidesk-chat-webhook',
      metadata: { tenantId },           // passes cleanly into $json.metadata.tenantId
      initialMessages: ['How can I assist you today?'],
      i18n: { en: { title: 'evoAIDesk' } }
    });
  }
</script>
</body>
</html>
